<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thesis - Experiment 2 Questionnaire</title>
<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
}
.container {
    width: 100%;
    max-width: 500px;
    padding: 24px;
    box-sizing: border-box;
}
.card {
    background: white;
    padding: 24px;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}
h2 { font-size: 20px; margin-bottom: 20px; margin-top: 0; }
.option-btn {
    width: 100%;
    padding: 16px;
    margin-bottom: 12px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    background: black;
    color: white;
    cursor: pointer;
    text-align: left;
    line-height: 1.4;
}
.option-btn:active { transform: scale(0.98); }
input[type="text"] {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    margin-bottom: 12px;
    border-radius: 12px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}
#progress { font-size: 14px; margin-bottom: 12px; color: gray; }
#result { display: none; }
#preview { width: 100%; margin-top: 16px; border-radius: 12px; display: block; }
canvas { display: none; }
</style>
</head>
<body>
<div class="container">
    <div class="card">
        <div id="progress"></div>
        <h2 id="question"></h2>
        <div id="answers"></div>
        <div id="result">
            <p style="margin-top:0;">Your artwork has been created.</p>
            <img id="preview">
        </div>
    </div>
</div>

<canvas id="artCanvas" width="675" height="1200"></canvas>

<script>
const questions = [
    "How do you look back on memories?",
    "When faced with uncertainty, you feel:",
    "If something meaningful begins to fade, you:",
    "When something in your life begins to unexpectedly change, you tend to:",
    "What feels true to you right now?",
    "Name something you're afraid of losing:"
];

const options = [
    ["I revisit them often in my head.", "I document them.", "I avoid them so they don't consume me.", "I let them shift over time."],
    ["Anxiety.", "A sense of possibility.", "The urge to regain control.", "Disoriented."],
    ["Try to preserve it.", "Mourn it while it happens.", "Accept that it was never meant to stay.", "Capture it before it's gone."],
    ["Hold on to it tightly.", "Step back and observe.", "Prepare for the worst.", "Let it unfold."],
    ["Change feels inevitable.", "I'm tired of resisting what shifts.", "Stability feels safer than change.", "I don't know what's stable anymore."]
];

let current = 0;
let selections = [];
let customText = "";

const canvas = document.getElementById("artCanvas");
const ctx = canvas.getContext("2d");
const preview = document.getElementById("preview");

function loadQuestion() {
    const progressEl = document.getElementById("progress");
    const questionEl = document.getElementById("question");
    const answersEl  = document.getElementById("answers");

    progressEl.textContent = `Question ${current + 1} of ${questions.length}`;
    questionEl.textContent = questions[current];
    answersEl.innerHTML = "";

    if (current === 5) {
        const input = document.createElement("input");
        input.type = "text";
        input.placeholder = "Type your answer";

        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = "Create Artwork";
        btn.onclick = () => {
            customText = input.value.trim() || "everything";
            questionEl.style.display = "none";
            answersEl.style.display  = "none";
            progressEl.style.display = "none";
            document.getElementById("result").style.display = "block";
            document.querySelector("#result p").textContent = "Creating your artwork…";
            generateArtwork();
        };

        answersEl.appendChild(input);
        answersEl.appendChild(btn);
        return;
    }

    options[current].forEach((option, index) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = option;
        btn.onclick = () => {
            selections.push(index);
            current++;
            loadQuestion();
        };
        answersEl.appendChild(btn);
    });
}

// Returns a Promise that resolves to a loaded Image, or null on error
function loadImage(src) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload  = () => resolve(img);
        img.onerror = () => { console.error("Failed to load:", src); resolve(null); };
        img.src = src;
    });
}

async function generateArtwork() {
    // Build shuffled list of image paths based on answers
    const keys = selections.map((sel, i) => `${i + 1}${["A","B","C","D"][sel]}`);
    keys.sort(() => Math.random() - 0.5);

    const paths = keys.map(key => `images/${key}.jpg`);

    // Wait for ALL images to finish loading before drawing anything
    const images = await Promise.all(paths.map(loadImage));

    // Clear and fill background
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw each layer (null entries are skipped)
    images.forEach(img => {
        if (img) drawImageLayer(img);
    });

    drawText();

    preview.src = canvas.toDataURL("image/jpeg", 0.92);
    document.querySelector("#result p").textContent = "Your artwork has been created.";
}

function drawImageLayer(img) {
    ctx.save();

    // Random opacity 0.45–0.85
    ctx.globalAlpha = 0.45 + Math.random() * 0.40;

    const canvasRatio = canvas.width / canvas.height;
    const imgRatio    = img.width / img.height;

    let drawWidth, drawHeight;
    if (imgRatio > canvasRatio) {
        drawHeight = canvas.height * (1.0 + Math.random() * 0.25);
        drawWidth  = drawHeight * imgRatio;
    } else {
        drawWidth  = canvas.width * (1.0 + Math.random() * 0.25);
        drawHeight = drawWidth / imgRatio;
    }

    const offsetX = (Math.random() - 0.5) * 120;
    const offsetY = (Math.random() - 0.5) * 240;
    const cx      = (canvas.width  - drawWidth)  / 2 + offsetX + drawWidth  / 2;
    const cy      = (canvas.height - drawHeight) / 2 + offsetY + drawHeight / 2;

    // Random rotation ±15°
    const angle = (Math.random() - 0.5) * 30 * (Math.PI / 180);

    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.drawImage(img, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
    ctx.restore();
}

function drawText() {
    const sentence = `I am afraid of losing ${customText}.`;
    const maxWidth = canvas.width - 80;
    const fontSize = 36;
    const lineH    = fontSize * 1.45;

    ctx.save();
    ctx.font = `italic ${fontSize}px Georgia, serif`;

    const words = sentence.split(" ");
    const lines = [];
    let line = "";
    words.forEach(word => {
        const test = line ? line + " " + word : word;
        if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = word;
        } else {
            line = test;
        }
    });
    if (line) lines.push(line);

    const totalH = lines.length * lineH;
    const blockY = canvas.height - 110 - totalH;

    ctx.globalAlpha = 0.6;
    ctx.fillStyle   = "#ffffff";
    ctx.fillRect(40, blockY - 18, canvas.width - 80, totalH + 36);

    ctx.globalAlpha  = 1;
    ctx.fillStyle    = "#000000";
    ctx.textAlign    = "center";
    ctx.textBaseline = "top";
    lines.forEach((l, i) => ctx.fillText(l, canvas.width / 2, blockY + i * lineH));

    ctx.restore();
}

loadQuestion();
</script>
</body>
</html>
