<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thesis - Experiment 2 Questionnaire</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
}
.container {
    width: 100%;
    max-width: 500px;
    padding: 24px;
    box-sizing: border-box;
}
.card {
    background: white;
    padding: 24px;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}
h2 { font-size: 20px; margin-bottom: 20px; margin-top: 0; }
.option-btn {
    width: 100%;
    padding: 16px;
    margin-bottom: 12px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    background: black;
    color: white;
    cursor: pointer;
    text-align: left;
    line-height: 1.4;
}
.option-btn:active { transform: scale(0.98); }
input[type="text"] {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    margin-bottom: 12px;
    border-radius: 12px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}
#progress { font-size: 14px; margin-bottom: 12px; color: gray; }
#result { display: none; }
#status { font-size: 14px; color: gray; margin-bottom: 8px; }
#error-log { font-size: 12px; color: #c00; margin-top: 8px; line-height: 1.6; display: none; }
#preview { width: 100%; margin-top: 16px; border-radius: 12px; display: block; }
canvas { display: none; }
</style>
</head>
<body>
<div class="container">
    <div class="card">
        <div id="progress"></div>
        <h2 id="question"></h2>
        <div id="answers"></div>
        <div id="result">
            <p id="status" style="margin-top:0;"></p>
            <div id="error-log"></div>
            <img id="preview">
        </div>
    </div>
</div>

<canvas id="artCanvas" width="675" height="1200"></canvas>

<script>
const questions = [
    "How do you look back on memories?",
    "When faced with uncertainty, you feel:",
    "If something meaningful begins to fade, you:",
    "When something in your life begins to unexpectedly change, you tend to:",
    "What feels true to you right now?",
    "Name something you're afraid of losing:"
];

const options = [
    ["I revisit them often in my head.", "I document them.", "I avoid them so they don't consume me.", "I let them shift over time."],
    ["Anxiety.", "A sense of possibility.", "The urge to regain control.", "Disoriented."],
    ["Try to preserve it.", "Mourn it while it happens.", "Accept that it was never meant to stay.", "Capture it before it's gone."],
    ["Hold on to it tightly.", "Step back and observe.", "Prepare for the worst.", "Let it unfold."],
    ["Change feels inevitable.", "I'm tired of resisting what shifts.", "Stability feels safer than change.", "I don't know what's stable anymore."]
];

let current = 0;
let selections = [];
let customText = "";

const canvas = document.getElementById("artCanvas");
const ctx = canvas.getContext("2d");
const preview = document.getElementById("preview");
const statusEl = document.getElementById("status");
const errorLog = document.getElementById("error-log");

const FONT   = "48px 'Space Mono', monospace";
const MARGIN = 36;
const LINE_H = 64;

function loadQuestion() {
    const progressEl = document.getElementById("progress");
    const questionEl = document.getElementById("question");
    const answersEl  = document.getElementById("answers");

    progressEl.textContent = `Question ${current + 1} of ${questions.length}`;
    questionEl.textContent = questions[current];
    answersEl.innerHTML = "";

    if (current === 5) {
        const input = document.createElement("input");
        input.type = "text";
        input.placeholder = "Type your answer";

        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = "Create Artwork";
        btn.onclick = () => {
            customText = input.value.trim().toLowerCase() || "everything";
            questionEl.style.display = "none";
            answersEl.style.display  = "none";
            progressEl.style.display = "none";
            document.getElementById("result").style.display = "block";
            statusEl.textContent = "Creating your artwork…";
            generateArtwork();
        };

        answersEl.appendChild(input);
        answersEl.appendChild(btn);
        return;
    }

    options[current].forEach((option, index) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = option;
        btn.onclick = () => {
            selections.push(index);
            current++;
            loadQuestion();
        };
        answersEl.appendChild(btn);
    });
}

function loadImage(src) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload  = () => resolve({ img, src, ok: true });
        img.onerror = () => { console.error("Failed:", src); resolve({ img: null, src, ok: false }); };
        img.src = src;
    });
}

function dashedLine() {
    ctx.font = FONT;
    const dashW = ctx.measureText("-").width;
    const count = Math.floor((canvas.width - MARGIN * 2) / dashW);
    return "-".repeat(count);
}

async function generateArtwork() {
    const keys = selections.map((sel, i) => `${i + 1}${["A","B","C","D"][sel]}`);
    keys.sort(() => Math.random() - 0.5);

    const results = await Promise.all(keys.map(key => loadImage(`images/${key}.jpg`)));

    const failed = results.filter(r => !r.ok);
    const loaded = results.filter(r => r.ok);

    if (failed.length > 0) {
        errorLog.style.display = "block";
        errorLog.innerHTML = "Could not load:<br>" + failed.map(r => `&nbsp;&nbsp;${r.src}`).join("<br>");
    }

    if (loaded.length === 0) {
        statusEl.textContent = "No images could be loaded. Check the error log and your browser console (F12).";
        return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    loaded.forEach((r, i) => drawImageLayer(r.img, keys[i]));
    drawReceipt();

    preview.src = canvas.toDataURL("image/jpeg", 0.92);
    statusEl.textContent = failed.length > 0
        ? `Artwork created with ${loaded.length} of 5 images (${failed.length} failed to load).`
        : "Your artwork has been created.";
}

function drawImageLayer(img, key) {
    ctx.save();
    const qNum = parseInt(key[0]);
    const isLowOpacity = qNum === 1 || qNum === 3;
    ctx.globalAlpha = isLowOpacity
        ? 0.15 + Math.random() * 0.35   // 0.15–0.50
        : 0.45 + Math.random() * 0.40;  // 0.45–0.85

    const canvasRatio = canvas.width / canvas.height;
    const imgRatio    = img.width / img.height;

    let drawWidth, drawHeight;
    if (imgRatio > canvasRatio) {
        drawHeight = canvas.height * (1.0 + Math.random() * 0.25);
        drawWidth  = drawHeight * imgRatio;
    } else {
        drawWidth  = canvas.width * (1.0 + Math.random() * 0.25);
        drawHeight = drawWidth / imgRatio;
    }

    const offsetX = (Math.random() - 0.5) * 120;
    const offsetY = (Math.random() - 0.5) * 240;
    const cx      = (canvas.width  - drawWidth)  / 2 + offsetX + drawWidth  / 2;
    const cy      = (canvas.height - drawHeight) / 2 + offsetY + drawHeight / 2;
    const angle   = (Math.random() - 0.5) * 30 * (Math.PI / 180);

    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.drawImage(img, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
    ctx.restore();
}

function drawReceipt() {
    ctx.save();
    ctx.font         = FONT;
    ctx.fillStyle    = "#000000";
    ctx.globalAlpha  = 1;
    ctx.textBaseline = "top";
    ctx.textAlign    = "left";

    const x    = MARGIN;
    const dash = dashedLine();

    // — TOP — title + first dashes
    let y = MARGIN;
    ctx.fillText("resisting", x, y);  y += LINE_H;
    ctx.fillText("transience", x, y); y += LINE_H + 8;
    ctx.fillText(dash, x, y);

    // — BOTTOM — work upward from canvas bottom
    const pad = n => String(n).padStart(2, "0");
    const now = new Date();
    const timestamp =
        `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ` +
        `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

    const tsY        = canvas.height - MARGIN - LINE_H;
    const dashBotY   = tsY - LINE_H - 8;
    const responseY  = dashBotY - LINE_H - 8;
    const losingY    = responseY - LINE_H;
    const ofY        = losingY - LINE_H;
    const afraidY    = ofY - LINE_H;
    const iAmY       = afraidY - LINE_H;
    ctx.fillText("i am", x, iAmY);
    ctx.fillText("afraid", x, afraidY);
    ctx.fillText("of", x, ofY);
    ctx.fillText("losing...", x, losingY);
    ctx.fillText(customText + ".", x, responseY);
    ctx.fillText(dash, x, dashBotY);
    ctx.fillText(timestamp, x, tsY);

    ctx.restore();
}

loadQuestion();
</script>
</body>
</html>
